name: Sync writeups to GitBook branch

on:
  push:
    branches:
      - main
    paths:
      - 'writeups/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync writeups folder only to gitbook branch
        run: |
          # Switch to gitbook branch
          git checkout gitbook

          # Checkout ONLY the writeups folder from main — nothing else
          git checkout main -- writeups/

          # Stage and commit if there are changes
          git diff --cached --quiet && echo "No changes to sync" && exit 0

          git add writeups/
          git commit -m "sync: update writeups from main"
          git push origin gitbook
