name: Sync writeups to GitBook branch

on:
  push:
    branches:
      - main
    paths:
      - 'writeups/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync writeups folder only to gitbook branch
        run: |
          git checkout gitbook
          git checkout main -- writeups/
          git add writeups/
          git diff --cached --quiet || git commit -m "sync: update writeups from main"
          git push origin gitbook
